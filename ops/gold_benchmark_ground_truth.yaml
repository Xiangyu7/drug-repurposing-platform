# Gold Standard Benchmark Ground Truth
# Three-tier validation: Recall (Tier1) + Novelty (Tier2) + Discovery (Tier3)
#
# Tier 1: FDA/EMA approved drugs (recall benchmark)
# Tier 2: Phase 2/3 clinical trial drugs (prospective discovery benchmark)
# Tier 3: Pipeline output not in Tier1/2 (validate via literature)

rheumatoid_arthritis:
  tier1_approved:
    - methotrexate
    - tofacitinib
    - baricitinib
    - tocilizumab
    - rituximab
    - leflunomide
    - hydroxychloroquine
    - sulfasalazine
  tier2_in_trial:
    - upadacitinib        # JAK1 selective, approved 2019 (newer)
    - filgotinib          # JAK1 selective, Phase 3
    - peresolimab         # PD-1 agonist, Phase 2 (NEJM 2023)
    - evobrutinib         # BTK inhibitor, Phase 2b
    - fenebrutinib        # BTK inhibitor, Phase 3
  structural_blind_spots:
    - leflunomide         # DHODH metabolic enzyme - signature method limitation

multiple_sclerosis:
  tier1_approved:
    - fingolimod
    - dimethyl fumarate
    - teriflunomide
    - natalizumab
    - ocrelizumab
  tier2_in_trial:
    - metformin           # Remyelination, MACSiMiSE-BRAIN Phase 2
    - clemastine          # Remyelination, CCMR Two Phase 2a
    - ibudilast           # Neuroprotection, Phase 2 (NEJM 2018)
    - simvastatin         # Neuroprotection, Phase 2 (MS-STAT)
    - masitinib           # Tyrosine kinase, Phase 3
    - alpha-lipoic acid   # Neuroprotection, Phase 2
  structural_blind_spots:
    - teriflunomide       # DHODH metabolic enzyme
    - natalizumab         # Biologic (integrin antibody)
    - ocrelizumab         # Biologic (anti-CD20)

type_2_diabetes:
  tier1_approved:
    - metformin
    - empagliflozin
    - pioglitazone
    - semaglutide
    - sitagliptin
  tier2_in_trial:
    - tirzepatide         # Dual GIP/GLP-1, approved 2022 (newer)
    - dapagliflozin       # SGLT2, approved but newer indication expansion
    - orforglipron        # Oral GLP-1, Phase 3
    - retatrutide         # Triple agonist, Phase 3
    - survodutide         # Dual glucagon/GLP-1, Phase 3
  structural_blind_spots:
    - semaglutide         # Biologic (GLP-1 peptide)

inflammatory_bowel_disease:
  tier1_approved:
    - infliximab
    - vedolizumab
    - ustekinumab
    - tofacitinib
    - azathioprine
  tier2_in_trial:
    - ozanimod            # S1P modulator, approved 2021 UC
    - etrasimod           # S1P modulator, approved 2023 UC
    - risankizumab        # IL-23, approved 2023 CD
    - filgotinib          # JAK1, approved EU for UC
    - guselkumab          # IL-23 p19, Phase 3
    - mirikizumab         # IL-23 p19, approved 2023 UC
    - obefazimod          # microRNA-124, Phase 3
  structural_blind_spots:
    - infliximab          # Biologic (anti-TNF)
    - vedolizumab         # Biologic (integrin antibody)
    - ustekinumab         # Biologic (IL-12/23)
