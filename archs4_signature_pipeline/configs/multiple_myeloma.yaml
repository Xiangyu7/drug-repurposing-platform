project:
  name: multiple_myeloma_archs4_signature
  outdir: outputs/multiple_myeloma
  workdir: work/multiple_myeloma
  seed: 42
disease:
  name: multiple myeloma
  efo_id: EFO_0001378
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
  - multiple myeloma
  - plasma cell myeloma
  - medullary plasmacytoma
  - myeloma, plasma cell, malignant
  - Kahler's disease
  - myeloid neoplasm of plasma cell
  - myelomatosis
  - Kahler disease
  - myeloma
  - multiple myeloma, susceptibility to, Somatic mutation
  - plasma cell myeloid neoplasm
  - multiple myeloma, resistance to, Somatic mutation
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
