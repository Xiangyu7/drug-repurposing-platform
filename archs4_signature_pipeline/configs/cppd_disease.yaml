project:
  name: cppd_disease_archs4_signature
  outdir: outputs/cppd_disease
  workdir: work/cppd_disease
  seed: 42
disease:
  name: cppd_disease
  efo_id: MONDO_0006239
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
  - calcium pyrophosphate deposition
  - CPPD
  - pseudogout
  - chondrocalcinosis
  - pyrophosphate arthropathy
  - CPPD crystal
  - CPP crystal
  - calcium pyrophosphate dihydrate
  - CPPD synovial
  - pseudogout synovial fluid
  - crystal arthritis pyrophosphate
  - articular chondrocalcinosis
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
