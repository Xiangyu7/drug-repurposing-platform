  - angiofollicular lymphoid hyperplasia
  - angiofollicular lymph node hyperplasia
  - AFLH
  - Castleman's tumour
  - Castleman's disease
  - Castleman's tumor
  - GLNH
  - angiofollicular ganglionic hyperplasia
  - angiofollicular lymph hyperplasia
  - giant lymph node hyperplasia
  - lymphoid hamartoma
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
