project:
  name: diabetic_nephropathy_archs4_signature
  outdir: outputs/diabetic_nephropathy
  workdir: work/diabetic_nephropathy
  seed: 42
disease:
  name: diabetic nephropathy
  efo_id: EFO_0000401
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
  - diabetic nephropathy
  - Diabetes with renal manifestations
  - Diabetic Kidney Disease
  - Diabetic renal disease (disorder)
  - Diabetes with renal manifestations (disorder)
  - Glomerulosclerosis, Diabetic
  - Diabetic renal disease
  - Nephrotic syndrome in diabetes mellitus
  - Nephrotic syndrome in diabetes mellitus (disorder)
  - Diabetic Kidney Diseases
  - Kidney Disease, Diabetic
  - Kimmelstiel Wilson Syndrome
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
