project:
  name: mogad_archs4_signature
  outdir: outputs/mogad
  workdir: work/mogad
  seed: 42
disease:
  name: mogad
  efo_id: MONDO_0100485
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
  - MOG antibody disease
  - MOGAD
  - MOG antibody
  - MOG-IgG
  - anti-MOG
  - myelin oligodendrocyte glycoprotein antibody
  - MOG-associated disorder
  - MOG encephalomyelitis
  - MOG optic neuritis
  - MOG-AD
  - MOG spectrum disorder
  - anti-MOG positive
  - MOG demyelination
  - ADEM MOG
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
