project:
  name: follicular_lymphoma_archs4_signature
  outdir: outputs/follicular_lymphoma
  workdir: work/follicular_lymphoma
  seed: 42
disease:
  name: follicular lymphoma
  efo_id: MONDO_0018906
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
  - follicular lymphoma
  - follicle center lymphoma
  - lymphoma, follicular centre cell
  - follicle centre lymphoma
  - lymphoma, follicular center cell
  - follicular centre cell lymphoma
  - follicular non-Hodgkin lymphoma
  - follicular center cell lymphoma
  - follicular non-Hodgkin's lymphoma
  - lymphoma, follicular, malignant
  - lymphoma, follicular
  - indolent lymphoma
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
