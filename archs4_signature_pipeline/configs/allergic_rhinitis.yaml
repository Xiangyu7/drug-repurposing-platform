project:
  name: allergic_rhinitis_archs4_signature
  outdir: outputs/allergic_rhinitis
  workdir: work/allergic_rhinitis
  seed: 42
disease:
  name: allergic_rhinitis
  efo_id: EFO_0003785
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
  - allergic rhinitis
  - hay fever
  - seasonal allergic rhinitis
  - perennial rhinitis
  - nasal allergy
  - rhinoconjunctivitis
  - allergic nasal
  - nasal mucosa allergy
  - nasal epithelium allergic
  - pollen allergy
  - house dust mite rhinitis
  - AR nasal
  - nasal lavage allergic
  - inferior turbinate
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
