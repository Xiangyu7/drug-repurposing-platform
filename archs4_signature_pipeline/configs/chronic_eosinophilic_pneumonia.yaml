project:
  name: chronic_eosinophilic_pneumonia_archs4_signature
  outdir: outputs/chronic_eosinophilic_pneumonia
  workdir: work/chronic_eosinophilic_pneumonia
  seed: 42
disease:
  name: chronic eosinophilic pneumonia
  efo_id: MONDO_0004806
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
  - chronic eosinophilic pneumonia
  - eosinophilic pneumonia, chronic
  - cryptogenic pulmonary eosinophilia
  - CEP
  - eosinophilic pneumonia chronic
  - Carrington disease
  - pulmonary eosinophilia
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
