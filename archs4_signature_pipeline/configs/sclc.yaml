project:
  name: sclc_archs4_signature
  outdir: outputs/sclc
  workdir: work/sclc
  seed: 42
disease:
  name: small cell lung carcinoma
  efo_id: EFO_0000702
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
  - small cell lung carcinoma
  - lung oat cell carcinoma
  - small cell neuroendocrine carcinoma of the lung
  - small cell carcinoma of lung
  - small cell cancer of the lung, somatic
  - lung small cell neuroendocrine carcinoma
  - oat cell carcinoma of the lung
  - oat cell lung carcinoma
  - small cell carcinoma of the lung
  - small cell lung cancer
  - small-cell cancer of lung
  - small cell neuroendocrine carcinoma of lung
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
