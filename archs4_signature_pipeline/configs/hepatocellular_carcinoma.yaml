project:
  name: hepatocellular_carcinoma_archs4_signature
  outdir: outputs/hepatocellular_carcinoma
  workdir: work/hepatocellular_carcinoma
  seed: 42
disease:
  name: hepatocellular carcinoma
  efo_id: EFO_0000182
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
