  - cancer, hepatocellular
  - hepatoblastoma, somatic
  - carcinoma of liver cells
  - hepatocellular adenocarcinoma
  - HCC
  - hepatoma
  - liver cell cancer (hepatocellular carcinoma)
  - hepatocellular carcinoma, somatic
  - carcinoma of liver
  - hepatocellular cancer, somatic
  - carcinoma, hepatocellular, malignant
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
