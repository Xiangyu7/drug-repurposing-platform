project:
  name: hypersensitivity_pneumonitis_archs4_signature
  outdir: outputs/hypersensitivity_pneumonitis
  workdir: work/hypersensitivity_pneumonitis
  seed: 42
disease:
  name: hypersensitivity pneumonitis
  efo_id: MONDO_0017853
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
  - hypersensitivity pneumonitis
  - exogen allergic alveolitis
  - allergic pneumonitis
  - allergic form of pneumonitis
  - alveolitis
  - extrinsic allergic alveolitis
  - alveolitis, extrinsic allergic
  - extrinsic allergic pneumonia hypersensitivity pneumonitis
  - allergic interstitial pneumonitis
  - EAA
  - bird fancier lung
  - farmer lung
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
