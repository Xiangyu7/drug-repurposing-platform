project:
  name: osteoarthritis_archs4_signature
  outdir: outputs/osteoarthritis
  workdir: work/osteoarthritis
  seed: 42
disease:
  name: osteoarthritis
  efo_id: MONDO_0005178
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
  - osteoarthritis
  - osteoarthrosis and allied disorder
  - degenerative joint disease
  - hypertrophic arthritis
  - osteoarthrosis
  - degenerative arthritis
  - knee osteoarthritis
  - hip osteoarthritis
  - cartilage degeneration
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
