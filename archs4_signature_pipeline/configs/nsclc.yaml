project:
  name: nsclc_archs4_signature
  outdir: outputs/nsclc
  workdir: work/nsclc
  seed: 42
disease:
  name: non-small cell lung cancer
  efo_id: EFO_0003060
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
  - non-small cell lung cancer
  - non-small cell lung carcinoma
  - non-small cell carcinoma of the lung
  - non-small cell cancer of lung
  - NSCLC
  - non-small cell cancer of the lung
  - non-small cell lung carcinoma (disease)
  - NSCLC - non-small cell lung cancer
  - non-small cell carcinoma of lung
  - lung adenocarcinoma
  - lung squamous cell carcinoma
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
