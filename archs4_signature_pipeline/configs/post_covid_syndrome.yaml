project:
  name: post_covid_syndrome_archs4_signature
  outdir: outputs/post_covid_syndrome
  workdir: work/post_covid_syndrome
  seed: 42
disease:
  name: post_covid_syndrome
  efo_id: MONDO_0100233
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
  - long COVID
  - post-COVID
  - post-acute COVID
  - PASC
  - post-acute sequelae
  - long-haul COVID
  - post COVID-19
  - COVID-19 recovery
  - persistent COVID
  - chronic COVID
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
