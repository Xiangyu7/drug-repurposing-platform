project:
  name: iga_vasculitis_archs4_signature
  outdir: outputs/iga_vasculitis
  workdir: work/iga_vasculitis
  seed: 42
disease:
  name: IgA vasculitis
  efo_id: EFO_1000965
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
  - IgA vasculitis
  - Henoch-Schoenlein purpura
  - Henoch-Schönlein purpura
  - Henoch-Schonlein Purpura
  - Purpura, Schoenlein-Henoch
  - Henoch-Scholein purpura
  - Purpura, autoimmune
  - Allergic purpura
  - Allergic purpura NOS (disorder)
  - Autoimmune purpura (disorder) [Ambiguous]
  - Henoch-Schonlein purpura (disorder)
  - 'Purpura: [allergic] or [Henoch-Schonlein allergy]'
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
