project:
  name: mycosis_fungoides_archs4_signature
  outdir: outputs/mycosis_fungoides
  workdir: work/mycosis_fungoides
  seed: 42
disease:
  name: mycosis fungoides
  efo_id: EFO_1001051
archs4:
  h5_path: data/archs4/human_gene_v2.5.h5
  min_samples_per_group: 3
  max_samples_per_group: 50
  max_series: 5
  case_keywords:
  - mycosis fungoides
  - cutaneous T-cell lymphoma/mycosis fungoides
  - mycosis fungoides of unspecified site
  - mycosis fungoides lymphoma
  - mycosis fungoides, Alibert-Bazin type
  - mycosis fungoides (morphologic abnormality)
  - CTCL/ mycosis fungoides
  - mycosis fungoides NOS (morphologic abnormality)
  - classic mycosis fungoides
  - granuloma fungoides
  - Alibert-Bazin syndrome
  - cutaneous T-cell lymphoma
  control_keywords:
  - normal
  - healthy
  - control
opentargets:
  min_association_score: 0.1
de:
  method: deseq2
  min_count: 10
  min_samples: 3
meta:
  model: DL
  min_sign_concordance: 0.8
  flag_i2_above: 0.75
signature:
  top_n: 300
  weight_formula: meta_z_times_ot_score_times_1minusFDR
